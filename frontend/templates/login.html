{% extends 'base.html' %}
{% block title %} Login | Quick Lab{% endblock %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='CSS/login_page.css') }}">

<div class="auth-wrapper">
  <!-- Dot Background Overlay -->
  <div class="background-dots"></div>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <a href="{{ url_for('google_auth.google_login' ) }}" class="social-auth-btn">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
        <span>Sign in with Google</span>
      </a>

      <div class="auth-separator">
        <span>OR CONTINUE WITH EMAIL</span>
      </div>

      <form method="post" action="/login">
        <div class="form-group">
          <label>Email</label>
          <div class="input-with-icon">
            <div class="input-wrapper">
              <i class="bi bi-envelope"></i>
              <input type="email" placeholder="you@example.com" name="useremail" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label>Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-with-icon">
            <div class="input-wrapper">
              <i class="bi bi-lock"></i>
              <input id="password" type="password" placeholder="••••••••" name="password" required>
            </div>
            <button type="button" class="toggle-password" id="togglePass">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('register_bp.register' ) }}">Sign up</a>
      </div>
    </div>
  </div>
</div>

<script>
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');

  togglePass?.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    togglePass.querySelector('i').classList.toggle('bi-eye');
    togglePass.querySelector('i').classList.toggle('bi-eye-slash');
  });
</script>

{% endblock %}
